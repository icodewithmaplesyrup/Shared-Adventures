<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Adventures // Phase 2 RPC Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --ink: #1a1208; --paper: #f5edd8; --accent: #aa3018; }
        body { background: var(--paper); color: var(--ink); font-family: 'Courier New', Courier, monospace; padding: 2rem; max-width: 900px; margin: auto; }
        .box { border: 2px solid var(--ink); padding: 1rem; margin-bottom: 1rem; background: rgba(255,255,255,0.35); }
        input, textarea { width: 100%; margin: 6px 0 8px; padding: 8px; }
        button { background: var(--ink); color: var(--paper); border: none; padding: 8px 16px; cursor: pointer; }
        pre { white-space: pre-wrap; word-break: break-word; color: var(--accent); }
    </style>
</head>
<body>
<h1>Phase 2 RPC Lab</h1>
<p>Uses <code>send_postcard</code>, <code>reply_postcard</code>, <code>pass_postcard</code>, <code>get_inbox</code>, and <code>get_route</code>.</p>

<div class="box">
    <h3>Session</h3>
    <input id="userId" placeholder="Current user UUID">
    <button id="btnInbox">Load Inbox</button>
</div>

<div class="box">
    <h3>Send New</h3>
    <textarea id="newBody" rows="3" placeholder="Body"></textarea>
    <input id="newCity" placeholder="City">
    <button id="btnSend">send_postcard</button>
</div>

<div class="box">
    <h3>Reply / Pass</h3>
    <input id="parentId" placeholder="Parent postcard id">
    <textarea id="childBody" rows="3" placeholder="Body"></textarea>
    <input id="childCity" placeholder="City">
    <button id="btnReply">reply_postcard</button>
    <button id="btnPass">pass_postcard</button>
</div>

<div class="box">
    <h3>Route Lookup</h3>
    <input id="rootId" placeholder="Root postcard id">
    <button id="btnRoute">get_route</button>
</div>

<div class="box">
    <h3>Output</h3>
    <pre id="out">Ready.</pre>
</div>

<script>
const SUPABASE_URL = window.SUPABASE_URL || localStorage.getItem('supabase_url') || '';
const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || localStorage.getItem('supabase_anon_key') || '';
const { createClient } = window.supabase;
const out = document.getElementById('out');

if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    out.textContent = 'Missing Supabase credentials. Set localStorage keys first.';
}

const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function show(value) {
    out.textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
}

async function callRpc(name, payload) {
    const { data, error } = await db.rpc(name, payload);
    if (error) {
        show(error);
        return null;
    }
    show(data);
    return data;
}

document.getElementById('btnInbox').onclick = async () => {
    const userId = document.getElementById('userId').value.trim();
    if (!userId) return show('Missing user id');
    await callRpc('get_inbox', { p_user_id: userId });
};

document.getElementById('btnSend').onclick = async () => {
    const userId = document.getElementById('userId').value.trim();
    await callRpc('send_postcard', {
        p_from_id: userId,
        p_body: document.getElementById('newBody').value,
        p_city: document.getElementById('newCity').value || null,
        p_image_url: null
    });
};

document.getElementById('btnReply').onclick = async () => {
    const userId = document.getElementById('userId').value.trim();
    await callRpc('reply_postcard', {
        p_parent_postcard_id: Number(document.getElementById('parentId').value),
        p_from_id: userId,
        p_body: document.getElementById('childBody').value,
        p_city: document.getElementById('childCity').value || null,
        p_image_url: null
    });
};

document.getElementById('btnPass').onclick = async () => {
    const userId = document.getElementById('userId').value.trim();
    await callRpc('pass_postcard', {
        p_parent_postcard_id: Number(document.getElementById('parentId').value),
        p_from_id: userId,
        p_body: document.getElementById('childBody').value,
        p_city: document.getElementById('childCity').value || null,
        p_image_url: null
    });
};

document.getElementById('btnRoute').onclick = async () => {
    await callRpc('get_route', {
        p_root_postcard_id: Number(document.getElementById('rootId').value)
    });
};
</script>
</body>
</html>
